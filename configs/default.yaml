data:
  n_subjects: 5
  target_channels:
    - "EEG Fpz-Cz"
    - "EEG Pz-Oz"
  target_sfreq: 100
  epoch_duration: 30
  seq_length: 20

model:
  n_classes: 5
  cnn_filters: [64, 128, 256]
  transformer_heads: 8
  transformer_layers: 4
  dropout: 0.1

training:
  epochs: 50
  batch_size: 32
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  num_workers: 0            # 0 avoids multiprocessing issues in Jupyter/CI
  early_stopping_patience: 10

evaluation:
  min_kappa: 0.70
  min_accuracy: 0.80
  stage_names:
    - Wake
    - N1
    - N2
    - N3
    - REM
