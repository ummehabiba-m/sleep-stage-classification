name: Sleep Stage Classification CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_training:
        description: 'Run full model training?'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']

env:
  PYTHON_VERSION: "3.12"
  MODEL_REGISTRY: "models"

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint & static checks
  # ─────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Check formatting (black)
        run: |
          if [ -n "$(find . -name '*.py' -not -path './.git/*' 2>/dev/null)" ]; then
            black --check scripts/ tests/
          else
            echo "No Python files found to format-check, skipping."
          fi

      - name: Check imports (isort)
        run: |
          if [ -n "$(find scripts tests -name '*.py' 2>/dev/null)" ]; then
            isort --check-only scripts/ tests/
          else
            echo "No Python files found to isort-check, skipping."
          fi

      - name: Lint (flake8)
        run: |
          if [ -n "$(find scripts tests -name '*.py' 2>/dev/null)" ]; then
            flake8 scripts/ tests/ --max-line-length=100 --ignore=E203,W503
          else
            echo "No Python files found to lint, skipping."
          fi

  # ─────────────────────────────────────────
  # JOB 2: Unit & integration tests
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov numpy scipy scikit-learn torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run unit tests
        run: |
          if [ -d "tests/unit" ] && [ -n "$(find tests/unit -name '*.py')" ]; then
            pytest tests/unit/ -v --tb=short -x
          else
            echo "No unit tests found, skipping."
          fi

  # ─────────────────────────────────────────
  # JOB 3: Data validation
  # ─────────────────────────────────────────
  validate-data:
    name: Validate Data Pipeline
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install numpy scipy

      - name: Run data validation (dry run)
        run: python scripts/validate_data.py --dry-run

  # ─────────────────────────────────────────
  # JOB 4: Train (manual or main branch only)
  # ─────────────────────────────────────────
  train:
    name: Train Model
    runs-on: ubuntu-latest
    needs: [test, validate-data]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event.inputs.run_training == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder - Training skipped
        run: echo "Training requires GPU runner and PhysioNet credentials. Trigger manually."

  # ─────────────────────────────────────────
  # JOB 5: Evaluate model results
  # ─────────────────────────────────────────
  evaluate:
    name: Evaluate Model
    runs-on: ubuntu-latest
    needs: [test, validate-data]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install numpy

      - name: Run evaluation on saved results
        run: |
          if [ -f "results.json" ]; then
            python scripts/evaluate.py \
              --model models/best_model.pth \
              --results results.json \
              --min-kappa 0.70 \
              --min-accuracy 0.80
          else
            echo "results.json not found — skipping evaluation (no trained model in repo yet)"
          fi

  # ─────────────────────────────────────────
  # JOB 6: Build Docker image
  # ─────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: evaluate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push on non-main)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: sleep-classifier:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
